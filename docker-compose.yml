version: "3.9"
services:
  postgres:
    image: postgres:15
    container_name: video_server_postgres
    environment:
      POSTGRES_USER: video
      POSTGRES_PASSWORD: video
      POSTGRES_DB: video_server
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: video_server_redis
    ports:
      - "6379:6379"

volumes:
  pg_data:
